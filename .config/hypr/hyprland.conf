##################
### MONİTÖRLËR ###
##################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=, highres, auto, 1.6


####################
### PROGRAMLARIM ###
####################

# See https://wiki.hypr.land/Configuring/Keywords/
$terminal = foot
$fileManager = foot -e yazi
$menu = rofi -show run
$mainMod = SUPER # Sets "Windows" key as main modifier


##########################
### ÇEVRE DEĞİŞKËNLERİ ###
##########################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = XCURSOR_THEME,~/sitelen lili/Posy_Cursor/
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,24

env = QT_QPA_PLATFORM,wayland

# Nvidia için
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

env = XKB_CONFIG_HOME,$HOME/.config/xkb


################
### BAŞLATMA ###
################

# Sistëm ve Masa Üstü
exec-once = plymouth --quit
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = xdg-user-dirs-update
exec-once = warp-cli connect
exec-once = steam -silent
exec-once = xrdb -merge ~/.Xresources
exec-once = vesktop --start-minimized

# Temalandırma
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'

# Hayaalet Programlar & Barlar
exec-once = awww-daemon
exec-once = awww img sitelen\ sinpin/taskimaidenv2.jpg  
exec-once = waybar
exec-once = nm-applet --indicator
# exec-once = hyprshade on vibrance # (Uncommented as per your note)

# Ses
exec-once = easyeffects --gapplication-service

# Kullanıcı Betikleri
# exec-once = python ~/ilo/gcp_widget.py &


#############
### GİRDİ ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = tr_custom
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    numlock_by_default = true

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat # This disables mouse acceleration!

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures/
gesture = 3, horizontal, workspace

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


######################
### GÖRÜNÜM VE HİS ###
######################

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10, 10, 10, 10

    border_size = 2

    # Renklër
    col.active_border = rgba(ffeda3ff)
    col.inactive_border = rgba(595959aa)

    # Boyutlandırma
    resize_on_border = false

    layout = dwindle

    # Yırtılma
    allow_tearing = true 
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Opaklık
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Bl’ur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes
    
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Düzënlër
dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = true 
}

xwayland {
  force_zero_scaling = true
}

render {
    # explicit_sync settings go here if needed
}


######################################
### PENCERELËR VE ÇALIŞMA ALANLARI ###
######################################

# --- Genël Pencere Kuralları ---

# Maksimize etme isteklerini yoksay
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# XWayland sürüklenimini düzëlt
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# --- Spesifik Uygulama Kuralları ---

# Hyprland Çalıştır
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Telegram
windowconf = opacity 1.0 override 1.0 override, title:(Telegram)
windowconf = noblur, title:(Telegram)

# Dunst (Bildirimler)
windowrule = opacity 0.9 0.8, match:class ^(dunst)$
layerrule = blur = on, match:namespace ^(notifications)$

# Osu!
windowrule = immediate = on, match:class ^(osu!)$
windowrule = fullscreen = on, match:class ^(osu!)$

windowrule = immediate = on, match:class ^(Cyberpunk 2077)$
windowrule = fullscreen = on, match:class ^(Cyberpunk 2077)$

windowrule = float = on, match:class ^(Sims.exe)$
windowrule = center = on, match:class ^(Sims.exe)$
windowrule = monitor 0, match:class ^(Sims.exe)$

#####################
### TUŞ ATAMALARI ###
#####################

# Uygulama Başlatıcılar
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, exec, /home/$(whoami)/ilo/toggle_fans.sh

# Pencere Yönetimi
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, F11, fullscreen

# Odak
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Çalışma Alanları: Geçiş
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# Çalışma Alanları: Hareket Edën Pencerelër
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, N, movetoworkspace, empty

# Özël Çalışma Alanı
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Çalışma Alanlarını Kaydırma
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Pencere Hareket Ettirme/Boyutlandırma (Faare)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Medya & Donanım Tuşları
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Resim & Video Kaydı
bind = , Print, exec, grim -g "$(slurp)" - | tee "$HOME/sitelen/$(date +'%Y-%m-%d_%H-%M-%S').png" | wl-copy -t image/png
bind = $mainMod ALT, R, exec, ~/.local/bin/record-toggle
bind = $mainMod SHIFT ALT, R, exec, ~/.local/bin/record-toggle mic
