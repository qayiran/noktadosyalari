##################
### MONİTÖRLËR ###
##################

# Bak https://wiki.hypr.land/0.54.0/Configuring/Monitors/
monitor=, highres, auto, 1.6


####################
### PROGRAMLARIM ###
####################

# Bak https://wiki.hypr.land/0.54.0/Configuring/Keywords/
$terminal = foot
$fileManager = foot -e yazi
$menu = rofi -show run
$mainMod = SUPER # "Windows" tuşunu ana düzënleyici olarak belirlër.


##########################
### ÇEVRE DEĞİŞKËNLERİ ###
##########################

# Bak https://wiki.hypr.land/0.54.0/Configuring/Environment-variables/

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = XCURSOR_THEME,"$HOME/sitelen lili/Posy_Cursor/"
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32

env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Nvidia için
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

env = XKB_CONFIG_HOME,$HOME/.config/xkb


################
### BAŞLATMA ###
################

# Sistëm ve Masa Üstü
exec-once = plymouth --quit
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = xdg-user-dirs-update
exec-once = warp-cli connect
exec-once = steam -silent
exec-once = xrdb -merge ~/.Xresources
exec-once = vesktop --start-minimized

# Temalandırma
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'

# Hayaalet Programlar & Barlar
exec-once = awww-daemon
exec-once = awww img "$HOME/sitelen sinpin/taskimaidenv2.jpg"  
exec-once = waybar
exec-once = nm-applet --indicator

# Ses
exec-once = easyeffects --gapplication-service

# Kullanıcı Betikleri
# exec-once = python $HOME/ilo/gcp_widget.py &
exec-once = $HOME/ilo/pin_loop.fish


#############
### GİRDİ ###
#############

# Bak https://wiki.hypr.land/0.54.0/Configuring/Variables/#input
input {
    kb_layout = tr_custom
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    numlock_by_default = true

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 düzënleme yok demek.
    accel_profile = flat # Bu faare ivmelenimini kapatır.

    touchpad {
        natural_scroll = false
    }
}

# Bak https://wiki.hypr.land/0.54.0/Configuring/Gestures/
gesture = 3, horizontal, workspace


######################
### GÖRÜNÜM VE HİS ###
######################

# Bak https://wiki.hypr.land/0.54.0/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10, 10, 10, 10

    border_size = 2

    # Renklër
    col.active_border = rgba(ffeda3ff)
    col.inactive_border = rgba(595959aa)

    # Boyutlandırma
    resize_on_border = false

    layout = dwindle

    # Yırtılma
    allow_tearing = true 
}

# Bak https://wiki.hypr.land/0.54.0/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Opaklık
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Bl’ur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# Bak https://wiki.hypr.land/0.54.0/Configuring/Variables/#animations
animations {
    enabled = yes
    
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Düzënlër
dwindle {
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = true
    initial_workspace_tracking = 0
}

xwayland {
  force_zero_scaling = true
}


######################################
### PENCERELËR VE ÇALIŞMA ALANLARI ###
######################################

# --- Genël Pencere Kuralları ---

# Maksimize etme isteklerini yoksay
windowrule {
  name = ignore-maximize
  suppress_event = maximize
  match:class = .*
}

# XWayland sürüklenimini düzëlt
windowrule {
  name = fix-xwayland-drag
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

# --- Spesifik Uygulama Kuralları ---

# Hyprland Çalıştır
windowrule {
  name = hyprland-run-float
  float = on
  move = (20) ((monitor_h*1)-120)
  match:class = ^(hyprland-run)$
}

# Telegram
windowrule {
  name = telegram-opacity
  opacity = 1.0 override
  no_blur = on
  match:title = ^(Telegram)$
}

# Dunst (Bildirimler)
windowrule {
  name = dunst-opacity
  opacity = 0.9 0.8
  match:class = ^(dunst)$
}

layerrule {
  name = notifications-blur
  blur = on
  match:namespace = notifications
}

# Osu! & Cyberpunk 2077
windowrule {
  name = osu-tearing-allow
  immediate = on
  fullscreen = on
  match:class = ^(osu\!)$
}

windowrule {
  name = cyberpunk-tearing-allow
  immediate = on
  fullscreen = on
  match:class = ^(Cyberpunk 2077)$
}

# Sims
windowrule {
  name = sims-float-center
  float = on
  center = on
  monitor = 0
  match:class = ^(Sims\.exe)$
}

# Pinterest Zımbırtısı
windowrule {
  name = pinterest-widget-float
  float = on
  workspace = 1
  size = 300 450
  move = ((monitor_w*1)-330) (30)
  no_focus = on
  no_shadow = on
  no_blur = on
  border_size = 0
  match:class = ^(pin_widget)$
}

# https://itsohen.github.io/hyprrulefix/ aracına sonsuz saygı.

#####################
### TUŞ ATAMALARI ###
#####################

# Uygulama Başlatıcılar
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, exec, $HOME/ilo/toggle_fans.sh

# Pencere Yönetimi
bind = $mainMod, C, killactive,
bind = $mainMod, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1280 720 && hyprctl dispatch centerwindow
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, M, exec, sh -c 'command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit'
bind = $mainMod, F11, fullscreen

# Odak
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Çalışma Alanları: Geçiş
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# Çalışma Alanları: Hareket Edën Pencerelër
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, N, movetoworkspace, empty

# Özël Çalışma Alanı
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Çalışma Alanlarını Kaydırma
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Pencere Hareket Ettirme/Boyutlandırma (Faare)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Medya & Donanım Tuşları
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Resim & Video Kaydı
bind = , Print, exec, sh -c 'grim -g "$(slurp)" - | tee "$HOME/sitelen/$(date +%Y-%m-%d_%H-%M-%S).png" | wl-copy -t image/png'
bind = $mainMod ALT, R, exec, $HOME/.local/bin/record-toggle
bind = $mainMod SHIFT ALT, R, exec, $HOME/.local/bin/record-toggle mic

# Pinterest Zımbırtısı Resim Kayıt
bind = SUPER SHIFT, P, exec, $HOME/ilo/save_pin.fish
